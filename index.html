<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRONOS VANDAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@700&display=swap');
        
        body {
            margin: 0;
            background: #0a0a0f;
            color: #fff;
            font-family: 'Fira Code', monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            border: 4px solid #222;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.1);
        }

        canvas {
            display: block;
            background: #000;
        }

        #ui {
            width: 800px;
            display: flex;
            justify-content: space-between;
            padding: 10px;
            font-size: 14px;
            color: #ff00ff;
            text-transform: uppercase;
        }

        .timer-bar {
            height: 4px;
            background: #222;
            width: 100%;
            margin-top: 5px;
        }

        #timer-fill {
            height: 100%;
            background: #00ffff;
            width: 0%;
        }

        #msg-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 20px;
            border: 2px solid #ff00ff;
            text-align: center;
            display: none;
            z-index: 10;
        }

        .instruction {
            margin-top: 10px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div id="ui">
    <div>Timeline: <span id="loop-count">1</span></div>
    <div style="width: 300px;">
        Loop Progress
        <div class="timer-bar"><div id="timer-fill"></div></div>
    </div>
    <div>Anomalies: <span id="paradox-warn">Stable</span></div>
</div>

<div id="game-container">
    <div id="msg-overlay">
        <h2 id="msg-title">PARADOX DETECTED</h2>
        <p id="msg-body">You collided with your past self.</p>
        <button onclick="resetGame()" style="background:#ff00ff; border:none; color:#000; padding:10px 20px; cursor:pointer; font-family:'Fira Code'; font-weight:bold;">RE-SYNCHRONIZE</button>
    </div>
    <canvas id="c"></canvas>
</div>

<div class="instruction">WASD/ARROWS to Move // SPACE to Jump // Don't touch your previous "Ghosts"</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    
    canvas.width = 800;
    canvas.height = 400;

    // Constants
    const LOOP_DURATION = 300; // frames (~5 seconds)
    const GRAVITY = 0.5;
    const JUMP_FORCE = -10;
    const SPEED = 4;

    // Game State
    let currentFrame = 0;
    let loopCount = 1;
    let playing = true;
    
    let player = {
        x: 50, y: 350, vx: 0, vy: 0, w: 20, h: 20,
        history: [] // Stores {x, y} for every frame of the loop
    };

    let ghosts = []; // Stores arrays of histories from previous loops
    let target = { x: 730, y: 100, w: 40, h: 40 };
    let obstacles = [
        { x: 0, y: 380, w: 800, h: 20 }, // Floor
        { x: 300, y: 250, w: 200, h: 20 }, // Mid platform
        { x: 650, y: 150, w: 150, h: 20 }  // High platform
    ];

    const keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    function resetGame() {
        player.x = 50; player.y = 350;
        player.vx = 0; player.vy = 0;
        player.history = [];
        ghosts = [];
        loopCount = 1;
        currentFrame = 0;
        playing = true;
        document.getElementById('msg-overlay').style.display = 'none';
        document.getElementById('loop-count').innerText = loopCount;
        loop();
    }

    function startNewLoop() {
        ghosts.push([...player.history]);
        player.history = [];
        player.x = 50;
        player.y = 350;
        player.vx = 0;
        player.vy = 0;
        currentFrame = 0;
        loopCount++;
        document.getElementById('loop-count').innerText = loopCount;
    }

    function checkCollision(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function loop() {
        if (!playing) return;

        // Update Physics
        if (keys['ArrowLeft'] || keys['KeyA']) player.vx = -SPEED;
        else if (keys['ArrowRight'] || keys['KeyD']) player.vx = SPEED;
        else player.vx *= 0.8;

        player.vy += GRAVITY;
        player.x += player.vx;
        player.y += player.vy;

        // Platform Collisions
        obstacles.forEach(o => {
            if (checkCollision(player, o)) {
                if (player.vy > 0 && player.y < o.y) {
                    player.y = o.y - player.h;
                    player.vy = 0;
                    if (keys['Space'] || keys['ArrowUp'] || keys['KeyW']) player.vy = JUMP_FORCE;
                } else {
                    player.x -= player.vx;
                }
            }
        });

        // Record History
        player.history.push({ x: player.x, y: player.y });

        // Draw
        ctx.fillStyle = '#050508';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Obstacles
        ctx.fillStyle = '#1a1a2e';
        obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));

        // Draw Target
        ctx.fillStyle = '#00ff00';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00ff00';
        ctx.fillRect(target.x, target.y, target.w, target.h);
        ctx.shadowBlur = 0;

        // Draw Ghosts and Check Paradox
        ghosts.forEach((ghostPath, index) => {
            const pos = ghostPath[currentFrame];
            if (pos) {
                // Ghost is a platform!
                ctx.fillStyle = `rgba(255, 0, 255, ${0.2 + (index * 0.1)})`;
                ctx.fillRect(pos.x, pos.y, player.w, player.h);

                // Paradox check: If you touch a ghost, you die
                let ghostObj = { x: pos.x, y: pos.y, w: player.w, h: player.h };
                if (checkCollision(player, ghostObj)) {
                    playing = false;
                    document.getElementById('msg-overlay').style.display = 'block';
                }
            }
        });

        // Draw Player
        ctx.fillStyle = '#00ffff';
        ctx.fillRect(player.x, player.y, player.w, player.h);

        // Target Check
        if (checkCollision(player, target)) {
            playing = false;
            document.getElementById('msg-title').innerText = "TIMELINE SECURED";
            document.getElementById('msg-body').innerText = `Completed in ${loopCount} loops!`;
            document.getElementById('msg-overlay').style.display = 'block';
        }

        // Timer
        currentFrame++;
        document.getElementById('timer-fill').style.width = (currentFrame / LOOP_DURATION * 100) + '%';
        
        if (currentFrame >= LOOP_DURATION) {
            startNewLoop();
        }

        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
