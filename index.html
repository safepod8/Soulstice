<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulstotion: Hookshot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body {
            margin: 0;
            background: #09090b;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 80px rgba(6, 182, 212, 0.15);
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            cursor: crosshair;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        .ui-layer {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            text-shadow: 2px 2px 0px #000;
        }

        .level-text { font-size: 24px; color: #fff; font-weight: bold; }
        .timer-text { font-size: 24px; color: #2dd4bf; }
        
        #intro {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0,0,0,0.85);
            padding: 20px 40px;
            border: 2px solid #06b6d4;
            border-radius: 8px;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .sub { color: #94a3b8; font-size: 14px; margin-top: 10px; }
        .highlight { color: #f43f5e; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="c"></canvas>
    
    <div class="ui-layer">
        <div class="level-text" id="lvl-disp">SECTOR 01</div>
        <div class="timer-text" id="time-disp">00:00.00</div>
    </div>

    <div id="intro">
        <h1 style="margin:0; color:#06b6d4;">SOULSTOTION: HOOKSHOT</h1>
        <div class="sub">A/D or LEFT/RIGHT to Move</div>
        <div class="sub">MOUSE CLICK & HOLD to Grapple</div>
        <div class="sub">Swing with momentum. Avoid <span class="highlight">Red Spikes</span>.</div>
        <div style="margin-top: 20px; font-weight: bold; color: #fde047;">CLICK TO START</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d', { alpha: false });
    
    // Internal Native Resolution
    const W = 800;
    const H = 450;
    canvas.width = W;
    canvas.height = H;

    // Maintain aspect ratio scaling
    const scale = Math.min(window.innerWidth / W, window.innerHeight / H) * 0.9;
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';

    // --- GAME STATE ---
    let state = 'MENU'; // MENU, PLAY, WIN
    let frame = 0;
    let startTime = 0;
    let levelIndex = 0;
    let deathCount = 0;
    let particles = [];
    let trails = [];
    let screenShake = 0;

    // --- INPUT ---
    const keys = {};
    const mouse = { x: 0, y: 0, down: false };

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    
    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = (e.clientX - rect.left) / scale;
        mouse.y = (e.clientY - rect.top) / scale;
    });

    canvas.addEventListener('mousedown', () => {
        if (state === 'MENU') {
            state = 'PLAY';
            document.getElementById('intro').style.opacity = 0;
            startTime = Date.now();
            loadLevel(0);
        } else if (state === 'PLAY') {
            mouse.down = true;
            fireGrapple();
        }
    });

    canvas.addEventListener('mouseup', () => {
        mouse.down = false;
        player.grapple.active = false;
    });

    // --- PHYSICS & PLAYER ---
    const player = {
        x: 0, y: 0,
        vx: 0, vy: 0,
        w: 16, h: 16,
        color: '#0ea5e9',
        grounded: false,
        grapple: { active: false, x: 0, y: 0, len: 0, pullSpeed: 2 }
    };

    const GRAVITY = 0.4;
    const FRICTION = 0.85;
    const AIR_RESIST = 0.98;

    // --- LEVELS ---
    // w: walls, s: spikes, g: goal, p: spawn
    const levels = [
        { // Lvl 1: The Gap
            p: {x: 50, y: 300},
            g: {x: 700, y: 250, w: 50, h: 100},
            w: [ {x: 0, y: 350, w: 200, h: 100}, {x: 650, y: 350, w: 150, h: 100}, {x: 300, y: 50, w: 200, h: 50} ],
            s: [ {x: 200, y: 430, w: 450, h: 20} ]
        },
        { // Lvl 2: Tarzan
            p: {x: 50, y: 300},
            g: {x: 700, y: 50, w: 50, h: 100},
            w: [ {x: 0, y: 350, w: 150, h: 100}, {x: 650, y: 150, w: 150, h: 300}, 
                 {x: 200, y: 50, w: 50, h: 50}, {x: 400, y: 150, w: 50, h: 50} ],
            s: [ {x: 150, y: 430, w: 500, h: 20} ]
        },
        { // Lvl 3: The Drop
            p: {x: 50, y: 50},
            g: {x: 700, y: 350, w: 50, h: 50},
            w: [ {x: 0, y: 100, w: 150, h: 350}, {x: 300, y: 250, w: 100, h: 200}, {x: 650, y: 400, w: 150, h: 50} ],
            s: [ {x: 150, y: 430, w: 150, h: 20}, {x: 400, y: 430, w: 250, h: 20}, {x: 300, y: 230, w: 100, h: 20} ]
        },
        { // Lvl 4: Momentum
            p: {x: 50, y: 350},
            g: {x: 50, y: 50, w: 50, h: 50},
            w: [ {x: 0, y: 400, w: 150, h: 50}, {x: 350, y: 150, w: 100, h: 300}, {x: 0, y: 100, w: 150, h: 50} ],
            s: [ {x: 150, y: 430, w: 650, h: 20}, {x: 330, y: 150, w: 20, h: 300}, {x: 450, y: 150, w: 20, h: 300} ]
        },
        { // Lvl 5: Spider-Bot
            p: {x: 50, y: 300},
            g: {x: 700, y: 300, w: 50, h: 50},
            w: [ {x: 0, y: 350, w: 100, h: 100}, {x: 700, y: 350, w: 100, h: 100},
                 {x: 200, y: 0, w: 50, h: 200}, {x: 350, y: 250, w: 50, h: 200}, {x: 500, y: 0, w: 50, h: 200}],
            s: [ {x: 100, y: 430, w: 600, h: 20}, {x: 200, y: 200, w: 50, h: 20}, {x: 500, y: 200, w: 50, h: 20} ]
        }
    ];

    let curLvl = null;

    function loadLevel(idx) {
        if (idx >= levels.length) {
            state = 'WIN';
            document.getElementById('lvl-disp').innerText = "SYSTEM CLEAR";
            document.getElementById('lvl-disp').style.color = "#fde047";
            return;
        }
        levelIndex = idx;
        curLvl = levels[idx];
        player.x = curLvl.p.x;
        player.y = curLvl.p.y;
        player.vx = 0; player.vy = 0;
        player.grapple.active = false;
        particles = []; trails = [];
        document.getElementById('lvl-disp').innerText = `SECTOR 0${idx + 1}`;
        createParticles(player.x + 8, player.y + 8, '#0ea5e9', 30);
        screenShake = 10;
    }

    function die() {
        deathCount++;
        createParticles(player.x + 8, player.y + 8, '#f43f5e', 50);
        screenShake = 15;
        // Instant respawn juice
        player.x = curLvl.p.x;
        player.y = curLvl.p.y;
        player.vx = 0; player.vy = 0;
        player.grapple.active = false;
        mouse.down = false;
    }

    // --- GRAPPLE LOGIC (Raycasting) ---
    function fireGrapple() {
        // Shoot ray from player to mouse
        let dx = mouse.x - (player.x + player.w/2);
        let dy = mouse.y - (player.y + player.h/2);
        let angle = Math.atan2(dy, dx);
        
        let stepX = Math.cos(angle) * 5;
        let stepY = Math.sin(angle) * 5;
        
        let testX = player.x + player.w/2;
        let testY = player.y + player.h/2;
        let hit = false;

        // Max grapple range 600px
        for(let i=0; i<120; i++) {
            testX += stepX; testY += stepY;
            
            // Check walls
            for(let w of curLvl.w) {
                if(testX >= w.x && testX <= w.x+w.w && testY >= w.y && testY <= w.y+w.h) {
                    player.grapple.x = testX;
                    player.grapple.y = testY;
                    player.grapple.active = true;
                    player.grapple.len = Math.hypot(player.grapple.x - (player.x+8), player.grapple.y - (player.y+8));
                    hit = true;
                    createParticles(testX, testY, '#2dd4bf', 15);
                    screenShake = 3;
                    break;
                }
            }
            if(hit) break;
        }
    }

    // --- GAME LOOP ---
    function update() {
        if (state !== 'PLAY') return;
        frame++;

        // Timer
        let elapsed = Date.now() - startTime;
        let mins = Math.floor(elapsed / 60000);
        let secs = Math.floor((elapsed % 60000) / 1000);
        let ms = Math.floor((elapsed % 1000) / 10);
        document.getElementById('time-disp').innerText = 
            `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}.${ms.toString().padStart(2,'0')}`;

        if (screenShake > 0) screenShake--;

        // Ground Movement
        if (keys['ArrowRight'] || keys['KeyD']) {
            player.vx += player.grounded ? 1.5 : 0.4;
        }
        if (keys['ArrowLeft'] || keys['KeyA']) {
            player.vx -= player.grounded ? 1.5 : 0.4;
        }

        // Apply Gravity
        player.vy += GRAVITY;

        // GRAPPLE PHYSICS (Verlet constraint)
        if (player.grapple.active) {
            let px = player.x + player.w/2;
            let py = player.y + player.h/2;
            let dx = px - player.grapple.x;
            let dy = py - player.grapple.y;
            let dist = Math.hypot(dx, dy);

            if (dist > player.grapple.len) {
                // Pull back to rope length circumference
                let nx = dx / dist;
                let ny = dy / dist;
                player.x = player.grapple.x + nx * player.grapple.len - player.w/2;
                player.y = player.grapple.y + ny * player.grapple.len - player.h/2;

                // Adjust velocity to flow along the tangent
                let dot = player.vx * nx + player.vy * ny;
                player.vx -= dot * nx;
                player.vy -= dot * ny;

                // Add "swing" momentum based on inputs
                if (keys['ArrowRight'] || keys['KeyD']) player.vx += ny * 0.8;
                if (keys['ArrowLeft'] || keys['KeyA']) player.vx -= ny * 0.8;
                
                // Allow retracting rope slightly
                if (keys['KeyW'] || keys['ArrowUp']) player.grapple.len = Math.max(20, player.grapple.len - 3);
            }
            // Air friction while swinging
            player.vx *= 0.99; player.vy *= 0.99;
        } else {
            // Normal friction
            if (player.grounded) player.vx *= FRICTION;
            else { player.vx *= AIR_RESIST; player.vy *= AIR_RESIST; }
        }

        // Terminal velocity
        player.vx = Math.max(-12, Math.min(12, player.vx));
        player.vy = Math.max(-15, Math.min(15, player.vy));

        // Movement Step
        player.x += player.vx;
        player.y += player.vy;

        // COLLISION (AABB)
        player.grounded = false;
        
        // Bounds
        if(player.y > H + 50) die(); // Fall in pit
        if(player.x < 0) { player.x = 0; player.vx *= -0.5; }
        if(player.x > W - player.w) { player.x = W - player.w; player.vx *= -0.5; }

        // Walls
        for (let w of curLvl.w) {
            // Simple resolution logic
            if (player.x < w.x + w.w && player.x + player.w > w.x &&
                player.y < w.y + w.h && player.y + player.h > w.y) {
                
                // Determine overlaps
                let overlapX = Math.min(player.x + player.w - w.x, w.x + w.w - player.x);
                let overlapY = Math.min(player.y + player.h - w.y, w.y + w.h - player.y);

                if (overlapX < overlapY) {
                    if (player.x < w.x) { player.x = w.x - player.w; player.vx = 0; }
                    else { player.x = w.x + w.w; player.vx = 0; }
                } else {
                    if (player.y < w.y) { player.y = w.y - player.h; player.vy = 0; player.grounded = true; }
                    else { player.y = w.y + w.h; player.vy = 0; }
                }
            }
        }

        // Spikes
        for (let s of curLvl.s) {
            if (player.x < s.x + s.w - 2 && player.x + player.w > s.x + 2 &&
                player.y < s.y + s.h - 2 && player.y + player.h > s.y + 2) {
                die();
            }
        }

        // Goal
        let g = curLvl.g;
        if (player.x < g.x + g.w && player.x + player.w > g.x &&
            player.y < g.y + g.h && player.y + player.h > g.y) {
            loadLevel(levelIndex + 1);
        }

        // Trail Juice
        if (frame % 3 === 0 && (Math.abs(player.vx) > 3 || Math.abs(player.vy) > 3)) {
            trails.push({ x: player.x, y: player.y, w: player.w, h: player.h, life: 1, 
                          vx: player.vx, vy: player.vy });
        }
        
        // Effects update
        trails.forEach((t, i) => { t.life -= 0.05; if(t.life<=0) trails.splice(i,1); });
        particles.forEach((p, i) => { 
            p.vy += GRAVITY * 0.5; p.x+=p.vx; p.y+=p.vy; p.life-=0.02; 
            if(p.life<=0) particles.splice(i,1); 
        });
    }

    function createParticles(x, y, color, amt) {
        for(let i=0; i<amt; i++) {
            particles.push({
                x, y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 1, c: color
            });
        }
    }

    // --- RENDER LOOP ---
    function draw() {
        // Deep Space Background
        ctx.fillStyle = '#05050a';
        ctx.fillRect(0, 0, W, H);

        ctx.save();
        if (screenShake > 0) {
            ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
        }

        // Draw Grid Background
        ctx.strokeStyle = '#1e1e2f';
        ctx.lineWidth = 1;
        for(let i=0; i<W; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke(); }
        for(let i=0; i<H; i+=40) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(W,i); ctx.stroke(); }

        if (state === 'PLAY' && curLvl) {
            // Draw Goal (Neon Green)
            ctx.fillStyle = '#22c55e';
            ctx.shadowColor = '#22c55e';
            ctx.shadowBlur = 15;
            ctx.fillRect(curLvl.g.x, curLvl.g.y, curLvl.g.w, curLvl.g.h);
            ctx.shadowBlur = 0;
            
            // Draw Spikes (Neon Red)
            ctx.fillStyle = '#f43f5e';
            for (let s of curLvl.s) {
                ctx.fillRect(s.x, s.y, s.w, s.h);
                // Detail teeth
                ctx.fillStyle = '#9f1239';
                for(let tx=0; tx<s.w; tx+=10) {
                    ctx.beginPath(); ctx.moveTo(s.x+tx, s.y); ctx.lineTo(s.x+tx+5, s.y-5); ctx.lineTo(s.x+tx+10, s.y); ctx.fill();
                }
                ctx.fillStyle = '#f43f5e';
            }

            // Draw Walls (Dark blue/grey with neon edges)
            for (let w of curLvl.w) {
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(w.x, w.y, w.w, w.h);
                ctx.strokeStyle = '#38bdf8';
                ctx.lineWidth = 2;
                ctx.strokeRect(w.x, w.y, w.w, w.h);
            }

            // Draw Grapple Beam
            if (player.grapple.active) {
                ctx.beginPath();
                ctx.moveTo(player.x + player.w/2, player.y + player.h/2);
                ctx.lineTo(player.grapple.x, player.grapple.y);
                ctx.strokeStyle = '#2dd4bf';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]); // Dashed laser line
                ctx.lineDashOffset = -frame * 2; // Animate beam
                ctx.stroke();
                ctx.setLineDash([]);
                
                // Anchor point glow
                ctx.fillStyle = '#fff';
                ctx.shadowColor = '#2dd4bf'; ctx.shadowBlur = 10;
                ctx.beginPath(); ctx.arc(player.grapple.x, player.grapple.y, 4, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Draw Trails
            trails.forEach(t => {
                ctx.globalAlpha = t.life * 0.5;
                ctx.fillStyle = player.color;
                
                // Rotated trail boxes
                ctx.save();
                ctx.translate(t.x + t.w/2, t.y + t.h/2);
                let ang = Math.atan2(t.vy, t.vx);
                ctx.rotate(ang);
                let stretch = 1 + Math.hypot(t.vx, t.vy)*0.1;
                ctx.scale(stretch, 1/stretch);
                ctx.fillRect(-t.w/2, -t.h/2, t.w, t.h);
                ctx.restore();
            });
            ctx.globalAlpha = 1;

            // Draw Player (Juicy Geometry)
            ctx.save();
            ctx.translate(player.x + player.w/2, player.y + player.h/2);
            
            // Squash and Stretch Math
            let speed = Math.hypot(player.vx, player.vy);
            let stretchX = 1 + speed * 0.05;
            let stretchY = 1 / stretchX;
            let angle = Math.atan2(player.vy, player.vx);

            if (speed > 1) {
                ctx.rotate(angle);
                ctx.scale(stretchX, stretchY);
            } else if (player.grounded && Math.abs(player.vx) < 0.5) {
                // Idle breathe
                let breathe = Math.sin(frame * 0.1) * 0.1;
                ctx.scale(1 + breathe, 1 - breathe);
            }

            // Player Body
            ctx.fillStyle = player.color;
            ctx.shadowColor = player.color; ctx.shadowBlur = 10;
            ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
            
            // Neon Eye / Visor
            ctx.fillStyle = '#fff'; ctx.shadowBlur = 0;
            ctx.fillRect((player.vx>0?2:-4), -2, 6, 4);

            ctx.restore();

            // Particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.c;
                ctx.fillRect(p.x, p.y, 3, 3);
            });
            ctx.globalAlpha = 1;
        }

        ctx.restore();

        // Scanlines
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        for(let i=0; i<H; i+=3) ctx.fillRect(0, i, W, 1);

        requestAnimationFrame(() => {
            update();
            draw();
        });
    }

    draw();
</script>
</body>
</html>
