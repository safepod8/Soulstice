<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulstotion: Hookshot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body {
            margin: 0;
            background: #09090b;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 80px rgba(6, 182, 212, 0.2);
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            cursor: crosshair;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        .ui-layer {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            text-shadow: 2px 2px 0px #000;
            z-index: 10;
        }

        .level-text { font-size: 24px; color: #fff; font-weight: bold; letter-spacing: 2px; }
        .timer-text { font-size: 24px; color: #2dd4bf; }
        
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.9);
            z-index: 20;
            text-align: center;
        }
        
        .btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: #06b6d4;
            color: #fff;
            border: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 18px;
            cursor: pointer;
            border-radius: 4px;
        }
        .btn:hover { background: #22d3ee; }
        .sub { color: #94a3b8; font-size: 14px; margin-top: 8px; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="c"></canvas>
    
    <div class="ui-layer">
        <div class="level-text" id="lvl-disp">SECTOR 01</div>
        <div class="timer-text" id="time-disp">00:00.00</div>
    </div>

    <div id="overlay">
        <h1 id="ov-title" style="margin:0; color:#06b6d4; font-size: 42px;">SOULSTOTION</h1>
        <p id="ov-body" class="sub">CLICK & HOLD TO GRAPPLE SYNCED WALLS</p>
        <button class="btn" id="start-btn" onclick="startGame()">START SYSTEM</button>
        <div id="stats-final" style="display:none; margin-top:15px; color:#2dd4bf;"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d', { alpha: false });
    
    const W = 800;
    const H = 450;
    canvas.width = W;
    canvas.height = H;

    const scale = Math.min(window.innerWidth / W, window.innerHeight / H) * 0.9;
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';

    // --- GAME ENGINE ---
    let gameState = 'MENU';
    let frame = 0;
    let startTime = 0;
    let levelIndex = 0;
    let deaths = 0;
    let particles = [];
    let trails = [];
    let screenShake = 0;

    const keys = {};
    const mouse = { x: 0, y: 0, down: false };

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = (e.clientX - rect.left) / scale;
        mouse.y = (e.clientY - rect.top) / scale;
    });
    canvas.addEventListener('mousedown', () => { if(gameState === 'PLAY') { mouse.down = true; fireGrapple(); } });
    canvas.addEventListener('mouseup', () => { mouse.down = false; player.grapple.active = false; });

    const player = {
        x: 0, y: 0, vx: 0, vy: 0, w: 16, h: 16, color: '#0ea5e9',
        grounded: false,
        grapple: { active: false, x: 0, y: 0, len: 0 }
    };

    const GRAVITY = 0.38;
    const FRICTION = 0.82;
    const AIR_RES = 0.985;

    // --- LEVEL DESIGN ---
    const levels = [
        { // 1: Intro
            p: {x: 60, y: 350}, g: {x: 720, y: 320, w: 40, h: 80},
            w: [{x: 0, y: 400, w: 200, h: 50}, {x: 600, y: 400, w: 200, h: 50}, {x: 300, y: 50, w: 200, h: 40}],
            s: [{x: 200, y: 440, w: 400, h: 10}]
        },
        { // 2: Climb
            p: {x: 100, y: 350}, g: {x: 100, y: 30, w: 60, h: 40},
            w: [{x: 0, y: 400, w: 800, h: 50}, {x: 400, y: 200, w: 40, h: 40}, {x: 200, y: 100, w: 40, h: 40}, {x: 0, y: 0, w: 800, h: 20}],
            s: [{x: 150, y: 390, w: 650, h: 10}]
        },
        { // 3: Precision
            p: {x: 50, y: 50}, g: {x: 720, y: 350, w: 40, h: 40},
            w: [{x: 0, y: 0, w: 150, h: 150}, {x: 300, y: 200, w: 50, h: 50}, {x: 500, y: 100, w: 50, h: 50}, {x: 700, y: 400, w: 100, h: 50}],
            s: [{x: 0, y: 440, w: 700, h: 10}, {x: 250, y: 200, w: 10, h: 50}]
        },
        { // 4: The Pendulum
            p: {x: 50, y: 350}, g: {x: 700, y: 50, w: 40, h: 40},
            w: [{x: 0, y: 400, w: 100, h: 50}, {x: 350, y: 0, w: 100, h: 40}, {x: 650, y: 100, w: 150, h: 30}],
            s: [{x: 100, y: 430, w: 700, h: 20}]
        },
        { // 5: Spider Cave
            p: {x: 400, y: 400}, g: {x: 400, y: 40, w: 40, h: 40},
            w: [{x: 350, y: 430, w: 100, h: 20}, {x: 0, y: 0, w: 50, h: 450}, {x: 750, y: 0, w: 50, h: 450}, {x: 200, y: 200, w: 400, h: 20}],
            s: [{x: 50, y: 440, w: 300, h: 10}, {x: 450, y: 440, w: 300, h: 10}, {x: 200, y: 190, w: 400, h: 10}]
        },
        { // 6: Moving Sync
            p: {x: 50, y: 350}, g: {x: 720, y: 350, w: 40, h: 40},
            w: [{x: 0, y: 400, w: 100, h: 50}, {x: 700, y: 400, w: 100, h: 50}],
            m: [{x: 300, y: 50, w: 200, h: 30, x1: 200, x2: 400, speed: 0.05}], // Moving platform
            s: [{x: 100, y: 440, w: 600, h: 10}]
        },
        { // 7: Slingshot
            p: {x: 400, y: 400}, g: {x: 400, y: 10, w: 200, h: 20},
            w: [{x: 350, y: 430, w: 100, h: 20}, {x: 0, y: 150, w: 300, h: 30}, {x: 500, y: 150, w: 300, h: 30}],
            s: [{x: 0, y: 440, w: 800, h: 10}, {x: 300, y: 150, w: 200, h: 30}]
        },
        { // 8: The Tunnel
            p: {x: 20, y: 220}, g: {x: 760, y: 220, w: 20, h: 40},
            w: [{x: 0, y: 0, w: 800, h: 180}, {x: 0, y: 270, w: 800, h: 180}],
            s: [{x: 100, y: 180, w: 20, h: 90}, {x: 300, y: 180, w: 20, h: 90}, {x: 500, y: 180, w: 20, h: 90}]
        },
        { // 9: Floating Isles
            p: {x: 50, y: 50}, g: {x: 50, y: 400, w: 40, h: 40},
            w: [{x: 0, y: 100, w: 100, h: 20}, {x: 300, y: 100, w: 50, h: 50}, {x: 600, y: 200, w: 50, h: 50}, {x: 300, y: 300, w: 50, h: 50}, {x: 0, y: 440, w: 100, h: 10}],
            s: [{x: 0, y: 0, w: 800, h: 5}, {x: 100, y: 440, w: 700, h: 10}]
        },
        { // 10: Final Descent
            p: {x: 400, y: 20}, g: {x: 400, y: 400, w: 60, h: 20},
            w: [{x: 350, y: 0, w: 100, h: 30}, {x: 0, y: 100, w: 300, h: 20}, {x: 500, y: 100, w: 300, h: 20}, {x: 0, y: 300, w: 300, h: 20}, {x: 500, y: 300, w: 300, h: 20}, {x: 350, y: 430, w: 100, h: 20}],
            m: [{x: 380, y: 200, w: 40, h: 40, x1: 100, x2: 700, speed: 0.1}],
            s: [{x: 0, y: 120, w: 800, h: 180}]
        }
    ];

    let curLvl = null;

    function startGame() {
        gameState = 'PLAY';
        document.getElementById('overlay').style.display = 'none';
        startTime = Date.now();
        levelIndex = 0;
        deaths = 0;
        loadLevel(0);
    }

    function loadLevel(idx) {
        if(idx >= levels.length) { winGame(); return; }
        levelIndex = idx;
        curLvl = JSON.parse(JSON.stringify(levels[idx])); // Deep copy for moving objects
        player.x = curLvl.p.x; player.y = curLvl.p.y;
        player.vx = 0; player.vy = 0;
        player.grapple.active = false;
        particles = []; trails = [];
        document.getElementById('lvl-disp').innerText = `SECTOR ${String(idx + 1).padStart(2, '0')}`;
        screenShake = 10;
        createParticles(player.x+8, player.y+8, '#0ea5e9', 30);
    }

    function winGame() {
        gameState = 'WIN';
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('ov-title').innerText = "SYSTEM RESTORED";
        document.getElementById('ov-title').style.color = "#2dd4bf";
        document.getElementById('ov-body').innerText = "ALL SECTORS CLEARED";
        let finalTime = document.getElementById('time-disp').innerText;
        document.getElementById('stats-final').style.display = 'block';
        document.getElementById('stats-final').innerText = `TIME: ${finalTime} | DEATHS: ${deaths}`;
        document.getElementById('start-btn').innerText = "REBOOT SYSTEM";
    }

    function die() {
        deaths++;
        screenShake = 15;
        createParticles(player.x+8, player.y+8, '#f43f5e', 40);
        player.x = curLvl.p.x; player.y = curLvl.p.y;
        player.vx = 0; player.vy = 0;
        player.grapple.active = false;
        mouse.down = false;
    }

    function fireGrapple() {
        let dx = mouse.x - (player.x + 8);
        let dy = mouse.y - (player.y + 8);
        let angle = Math.atan2(dy, dx);
        let sx = Math.cos(angle)*6;
        let sy = Math.sin(angle)*6;
        let tx = player.x+8, ty = player.y+8;
        
        for(let i=0; i<150; i++) {
            tx += sx; ty += sy;
            // Check Walls
            let hit = false;
            let allWalls = [...curLvl.w, ...(curLvl.m || [])];
            for(let w of allWalls) {
                if(tx >= w.x && tx <= w.x+w.w && ty >= w.y && ty <= w.y+w.h) {
                    player.grapple.x = tx; player.grapple.y = ty;
                    player.grapple.active = true;
                    player.grapple.len = Math.hypot(tx-(player.x+8), ty-(player.y+8));
                    hit = true; break;
                }
            }
            if(hit) { createParticles(tx, ty, '#2dd4bf', 10); break; }
        }
    }

    function update() {
        if(gameState !== 'PLAY') return;
        frame++;
        if(screenShake > 0) screenShake--;

        // Timer
        let elapsed = Date.now() - startTime;
        let ms = Math.floor((elapsed%1000)/10);
        let sc = Math.floor((elapsed/1000)%60);
        let mn = Math.floor(elapsed/60000);
        document.getElementById('time-disp').innerText = `${mn.toString().padStart(2,'0')}:${sc.toString().padStart(2,'0')}.${ms.toString().padStart(2,'0')}`;

        // Moving Platforms logic
        if(curLvl.m) {
            curLvl.m.forEach(m => {
                m.x = m.x1 + (Math.sin(frame * m.speed) + 1) * 0.5 * (m.x2 - m.x1);
            });
        }

        // Input
        if(keys['ArrowRight'] || keys['KeyD']) player.vx += player.grounded ? 0.8 : 0.3;
        if(keys['ArrowLeft'] || keys['KeyA']) player.vx -= player.grounded ? 0.8 : 0.3;

        player.vy += GRAVITY;

        if(player.grapple.active) {
            let px = player.x+8, py = player.y+8;
            let dx = px - player.grapple.x, dy = py - player.grapple.y;
            let dist = Math.hypot(dx, dy);
            if(dist > player.grapple.len) {
                let nx = dx/dist, ny = dy/dist;
                player.x = player.grapple.x + nx * player.grapple.len - 8;
                player.y = player.grapple.y + ny * player.grapple.len - 8;
                let dot = player.vx * nx + player.vy * ny;
                player.vx -= dot * nx; player.vy -= dot * ny;
                if(keys['KeyW'] || keys['ArrowUp']) player.grapple.len = Math.max(10, player.grapple.len - 4);
                if(keys['KeyS'] || keys['ArrowDown']) player.grapple.len = Math.min(600, player.grapple.len + 4);
            }
            player.vx *= 0.992; player.vy *= 0.992;
        } else {
            if(player.grounded) player.vx *= FRICTION; else player.vx *= AIR_RES;
        }

        player.vx = Math.min(15, Math.max(-15, player.vx));
        player.x += player.vx; player.y += player.vy;

        // Collision
        player.grounded = false;
        if(player.y > H + 100) die();
        
        let allWalls = [...curLvl.w, ...(curLvl.m || [])];
        for(let w of allWalls) {
            if(player.x < w.x+w.w && player.x+player.w > w.x && player.y < w.y+w.h && player.y+player.h > w.y) {
                let ox = Math.min(player.x+player.w-w.x, w.x+w.w-player.x);
                let oy = Math.min(player.y+player.h-w.y, w.y+w.h-player.y);
                if(ox < oy) {
                    if(player.x < w.x) player.x = w.x-player.w; else player.x = w.x+w.w;
                    player.vx = 0;
                } else {
                    if(player.y < w.y) { player.y = w.y-player.h; player.vy = 0; player.grounded = true; }
                    else { player.y = w.y+w.h; player.vy = 0; }
                }
            }
        }

        for(let s of curLvl.s) {
            if(player.x < s.x+s.w-4 && player.x+player.w > s.x+4 && player.y < s.y+s.h-4 && player.y+player.h > s.y+4) die();
        }

        let g = curLvl.g;
        if(player.x < g.x+g.w && player.x+player.w > g.x && player.y < g.y+g.h && player.y+player.h > g.y) loadLevel(levelIndex+1);

        if(frame%4===0 && Math.hypot(player.vx, player.vy) > 2) trails.push({x: player.x, y: player.y, l: 1});
        trails.forEach((t,i) => { t.l -= 0.08; if(t.l<=0) trails.splice(i,1); });
        particles.forEach((p,i) => { p.x+=p.vx; p.y+=p.vy; p.l-=0.02; if(p.l<=0) particles.splice(i,1); });
    }

    function createParticles(x,y,c,a) {
        for(let i=0; i<a; i++) particles.push({x,y,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10,l:1,c});
    }

    function draw() {
        ctx.fillStyle = '#050508'; ctx.fillRect(0,0,W,H);
        ctx.save();
        if(screenShake > 0) ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);

        if(gameState === 'PLAY') {
            // Draw Level
            ctx.fillStyle = '#16a34a'; ctx.shadowBlur = 10; ctx.shadowColor = '#16a34a';
            ctx.fillRect(curLvl.g.x, curLvl.g.y, curLvl.g.w, curLvl.g.h);
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#1e293b'; ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 2;
            curLvl.w.forEach(w => { ctx.fillRect(w.x, w.y, w.w, w.h); ctx.strokeRect(w.x, w.y, w.w, w.h); });
            if(curLvl.m) curLvl.m.forEach(m => { 
                ctx.fillStyle = '#334155'; ctx.fillRect(m.x, m.y, m.w, m.h); 
                ctx.strokeStyle = '#2dd4bf'; ctx.strokeRect(m.x, m.y, m.w, m.h); 
            });

            ctx.fillStyle = '#f43f5e'; curLvl.s.forEach(s => {
                ctx.fillRect(s.x, s.y, s.w, s.h);
                ctx.fillStyle = '#881337';
                for(let tx=0; tx<s.w; tx+=10) { ctx.beginPath(); ctx.moveTo(s.x+tx, s.y); ctx.lineTo(s.x+tx+5, s.y-5); ctx.lineTo(s.x+tx+10, s.y); ctx.fill(); }
                ctx.fillStyle = '#f43f5e';
            });

            if(player.grapple.active) {
                ctx.beginPath(); ctx.moveTo(player.x+8, player.y+8); ctx.lineTo(player.grapple.x, player.grapple.y);
                ctx.strokeStyle = '#2dd4bf'; ctx.lineWidth = 2; ctx.setLineDash([4,4]); ctx.lineDashOffset = -frame*2;
                ctx.stroke(); ctx.setLineDash([]);
            }

            trails.forEach(t => { ctx.globalAlpha = t.l*0.3; ctx.fillStyle = player.color; ctx.fillRect(t.x, t.y, 16, 16); });
            ctx.globalAlpha = 1;

            ctx.save(); ctx.translate(player.x+8, player.y+8);
            let s = Math.hypot(player.vx, player.vy);
            if(s > 1) { ctx.rotate(Math.atan2(player.vy, player.vx)); ctx.scale(1+s*0.05, 1/(1+s*0.05)); }
            ctx.fillStyle = player.color; ctx.shadowBlur = 10; ctx.shadowColor = player.color;
            ctx.fillRect(-8, -8, 16, 16); ctx.fillStyle = '#fff'; ctx.fillRect(player.vx>0?2:-4, -2, 4, 4);
            ctx.restore(); ctx.shadowBlur = 0;

            particles.forEach(p => { ctx.globalAlpha = p.l; ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, 3, 3); });
            ctx.globalAlpha = 1;
        }
        ctx.restore();
        requestAnimationFrame(() => { update(); draw(); });
    }
    draw();
</script>
</body>
</html>
