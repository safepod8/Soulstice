<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Soul Shard - Boss Encounter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Press+Start+2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            image-rendering: pixelated;
        }

        #game-container {
            position: relative;
            width: 640px;
            height: 480px;
            border: 4px solid #fff;
            background: #000;
        }

        canvas {
            display: block;
        }

        .ui-layer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 580px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .hp-bar-container {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 12px;
        }

        .hp-bg {
            width: 100px;
            height: 20px;
            background: #f00;
            position: relative;
        }

        #hp-fill {
            width: 100%;
            height: 100%;
            background: #ff0;
        }

        .dialog-box {
            position: absolute;
            top: 260px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 100px;
            border: 3px solid #fff;
            padding: 15px;
            font-size: 14px;
            line-height: 1.6;
            background: #000;
        }

        .hidden { display: none; }
        
        #instructions {
            position: absolute;
            bottom: -40px;
            width: 100%;
            text-align: center;
            font-size: 8px;
            color: #888;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="dialog" class="dialog-box">
        * The Guardian blocks your path.
        <br><br>
        [Z] Start Battle
    </div>

    <div class="ui-layer">
        <div style="font-size: 14px;">PLAYER  LV 19</div>
        <div class="hp-bar-container">
            <span>HP</span>
            <div class="hp-bg">
                <div id="hp-fill"></div>
            </div>
            <span id="hp-text">20 / 20</span>
        </div>
    </div>
    
    <div id="instructions">ARROWS TO MOVE | Z TO CONFIRM | PC RECOMMENDED</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 640;
    canvas.height = 480;

    // Game Constants
    const BOX_X = 170;
    const BOX_Y = 250;
    const BOX_W = 300;
    const BOX_H = 140;

    // Game State
    let state = 'DIALOG';
    let pHP = 20;
    let maxHP = 20;
    let frame = 0;
    let bullets = [];
    let bossY = 80;
    let bossFloat = 0;
    let invuln = 0;

    const player = {
        x: 320,
        y: 320,
        size: 8,
        speed: 3
    };

    const keys = {};
    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if(e.code === 'KeyZ' && state === 'DIALOG') {
            startBattle();
        }
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function startBattle() {
        state = 'BATTLE';
        document.getElementById('dialog').classList.add('hidden');
        bullets = [];
        pHP = 20;
        updateUI();
    }

    function updateUI() {
        const fill = document.getElementById('hp-fill');
        const text = document.getElementById('hp-text');
        const pct = (pHP / maxHP) * 100;
        fill.style.width = pct + '%';
        text.innerText = `${pHP} / ${maxHP}`;
    }

    function spawnBullet(type) {
        if (type === 'circle') {
            const angle = (frame * 0.1);
            bullets.push({
                x: 320, y: 120,
                vx: Math.cos(angle) * 3,
                vy: Math.sin(angle) * 3,
                size: 6,
                color: '#fff'
            });
        }
        if (type === 'rain') {
            bullets.push({
                x: BOX_X + Math.random() * BOX_W,
                y: BOX_Y - 20,
                vx: 0,
                vy: 2.5 + Math.random() * 2,
                size: 4,
                color: '#0cf'
            });
        }
        if (type === 'sweep') {
            bullets.push({
                x: BOX_X - 10,
                y: BOX_Y + 20 + (Math.sin(frame * 0.05) * 50 + 50),
                vx: 4,
                vy: 0,
                size: 10,
                color: '#f0f'
            });
        }
    }

    function update() {
        if (state !== 'BATTLE') return;

        frame++;
        if (invuln > 0) invuln--;

        // Player Movement
        if (keys['ArrowUp']) player.y -= player.speed;
        if (keys['ArrowDown']) player.y += player.speed;
        if (keys['ArrowLeft']) player.x -= player.speed;
        if (keys['ArrowRight']) player.x += player.speed;

        // Box Collisions
        player.x = Math.max(BOX_X + 10, Math.min(BOX_X + BOX_W - 10, player.x));
        player.y = Math.max(BOX_Y + 10, Math.min(BOX_Y + BOX_H - 10, player.y));

        // Boss Patterns
        if (frame % 5 === 0) spawnBullet('circle');
        if (frame % 15 === 0) spawnBullet('rain');
        if (frame % 60 === 0) spawnBullet('sweep');

        // Bullet Logic
        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            b.x += b.vx;
            b.y += b.vy;

            // Collision with player
            const dist = Math.hypot(player.x - b.x, player.y - b.y);
            if (dist < player.size + b.size && invuln <= 0) {
                pHP = Math.max(0, pHP - 1);
                invuln = 30; // 0.5s invuln
                updateUI();
                if (pHP <= 0) {
                    state = 'DIALOG';
                    document.getElementById('dialog').classList.remove('hidden');
                    document.getElementById('dialog').innerHTML = "* You lost your SOUL.<br><br>[Z] Try Again";
                }
            }

            // Remove bullets out of bounds
            if (b.y > 500 || b.x < 0 || b.x > 640) bullets.splice(i, 1);
        }

        bossFloat = Math.sin(frame * 0.05) * 10;
    }

    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Boss (Pixel Art Style)
        ctx.save();
        ctx.translate(320, bossY + bossFloat);
        
        // Cloak
        ctx.fillStyle = '#111';
        ctx.beginPath();
        ctx.moveTo(0, -40);
        ctx.lineTo(40, 60);
        ctx.lineTo(-40, 60);
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Face
        ctx.fillStyle = '#000';
        ctx.fillRect(-15, -10, 30, 25);
        ctx.strokeStyle = '#fff';
        ctx.strokeRect(-15, -10, 30, 25);
        
        // Glowing Eyes
        ctx.fillStyle = (frame % 20 < 10) ? '#f00' : '#fff';
        ctx.fillRect(-10, 0, 4, 4);
        ctx.fillRect(6, 0, 4, 4);
        
        ctx.restore();

        // Draw Battle Box
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 5;
        ctx.strokeRect(BOX_X, BOX_Y, BOX_W, BOX_H);

        // Draw Bullets
        bullets.forEach(b => {
            ctx.fillStyle = b.color;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
            ctx.fill();
            // Glow effect
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.stroke();
        });

        // Draw Soul (Player)
        ctx.fillStyle = invuln % 4 < 2 ? '#f00' : '#800';
        // Heart shape
        const px = player.x;
        const py = player.y;
        ctx.beginPath();
        ctx.moveTo(px, py + 4);
        ctx.bezierCurveTo(px - 10, py - 10, px - 15, py + 5, px, py + 12);
        ctx.bezierCurveTo(px + 15, py + 5, px + 10, py - 10, px, py + 4);
        ctx.fill();

        requestAnimationFrame(draw);
    }

    setInterval(update, 1000/60);
    draw();
</script>
</body>
</html>
