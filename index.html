<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIO-SIGNAL: TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        :root {
            --neon-green: #39ff14;
            --dark-flesh: #1a0f0f;
            --crt-glow: rgba(57, 255, 20, 0.15);
        }

        body {
            margin: 0;
            background: #050505;
            color: var(--neon-green);
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #terminal {
            width: 800px;
            height: 500px;
            background: #0a0a0a;
            border: 4px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 100px #1a0f0f;
            display: grid;
            grid-template-columns: 1fr 280px;
            padding: 20px;
            gap: 20px;
            position: relative;
        }

        /* Scanline Overlay */
        #terminal::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .screen {
            background: #000;
            border: 2px solid #222;
            position: relative;
            overflow: hidden;
        }

        #main-scope {
            height: 300px;
            box-shadow: inset 0 0 20px var(--crt-glow);
        }

        #control-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 10px;
            background: #111;
            border: 1px solid #333;
        }

        .status-box {
            border: 1px solid #444;
            padding: 10px;
            font-size: 18px;
        }

        .danger { color: #ff3131; text-shadow: 0 0 10px #ff3131; }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        input[type=range] {
            appearance: none;
            background: #222;
            height: 10px;
            border: 1px solid var(--neon-green);
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 15px;
            height: 25px;
            background: var(--neon-green);
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-green);
        }

        #log {
            height: 120px;
            font-size: 14px;
            padding: 5px;
            overflow-y: hidden;
            border-top: 1px solid #333;
            color: #666;
        }

        .heart {
            display: inline-block;
            animation: pulse 0.6s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: #ff3131; }
            100% { transform: scale(1); }
        }

        #noise {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/White_noise.png');
            opacity: 0.05;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="terminal">
    <div id="noise"></div>
    
    <div class="left-col">
        <div class="screen" id="main-scope">
            <canvas id="scopeCanvas"></canvas>
        </div>
        <div id="log">
            > INITIALIZING NEURAL LINK...<br>
            > ORGANIC MASS DETECTED IN SECTOR 4...<br>
            > WARNING: SYNC LEVELS DROPPING...
        </div>
    </div>

    <div id="control-panel">
        <div class="status-box">
            STABILITY: <span id="stability">100%</span>
            <div id="integrity-bar" style="width:100%; height:4px; background:#222; margin-top:5px;">
                <div id="integrity-fill" style="width:100%; height:100%; background:var(--neon-green);"></div>
            </div>
        </div>

        <div class="slider-group">
            <label>PULSE FREQUENCY</label>
            <input type="range" id="freq" min="0.01" max="0.2" step="0.001" value="0.05">
        </div>

        <div class="slider-group">
            <label>AMPLITUDE DEPTH</label>
            <input type="range" id="amp" min="10" max="100" step="1" value="50">
        </div>

        <div class="slider-group">
            <label>PHASE SHIFT</label>
            <input type="range" id="phase" min="0" max="6.28" step="0.01" value="0">
        </div>

        <div id="alert-zone" style="margin-top: auto; padding: 10px; border: 1px dashed #444; text-align: center;">
            <span class="heart">❤</span> <span id="sync-label">BIO-SYNC: 0%</span>
        </div>
        
        <button id="reset-btn" style="display:none; background: #ff3131; border:none; color:white; font-family:'VT323'; cursor:pointer; padding:10px;">RE-INITIALIZE SYSTEM</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('scopeCanvas');
    const ctx = canvas.getContext('2d');
    const logEl = document.getElementById('log');
    
    // UI Refs
    const freqIn = document.getElementById('freq');
    const ampIn = document.getElementById('amp');
    const phaseIn = document.getElementById('phase');
    const stabilityEl = document.getElementById('stability');
    const integrityFill = document.getElementById('integrity-fill');
    const syncLabel = document.getElementById('sync-label');

    let w, h;
    function resize() {
        w = canvas.width = canvas.parentElement.clientWidth;
        h = canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Game Variables
    let stability = 100;
    let time = 0;
    let playing = true;

    // Target (The creature's signal)
    let targetSignal = {
        freq: 0.08,
        amp: 70,
        phase: 1.5
    };

    function changeTarget() {
        targetSignal.freq = 0.02 + Math.random() * 0.15;
        targetSignal.amp = 20 + Math.random() * 70;
        targetSignal.phase = Math.random() * 6;
        addLog("> NEURAL SHIFT DETECTED...");
    }

    function addLog(msg) {
        const div = document.createElement('div');
        div.innerHTML = msg;
        logEl.prepend(div);
    }

    setInterval(() => {
        if(playing) changeTarget();
    }, 8000);

    function draw() {
        if(!playing) return;
        
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, w, h);
        
        time += 0.1;
        
        const userFreq = parseFloat(freqIn.value);
        const userAmp = parseFloat(ampIn.value);
        const userPhase = parseFloat(phaseIn.value);

        // Calculate Sync
        const fDiff = Math.abs(userFreq - targetSignal.freq) / 0.2;
        const aDiff = Math.abs(userAmp - targetSignal.amp) / 100;
        const pDiff = Math.abs(Math.sin(userPhase) - Math.sin(targetSignal.phase)) / 2;
        
        const syncScore = Math.max(0, 100 - (fDiff * 40 + aDiff * 40 + pDiff * 20));
        syncLabel.innerText = `BIO-SYNC: ${Math.floor(syncScore)}%`;

        if (syncScore < 70) {
            stability -= 0.1;
            ctx.fillStyle = 'rgba(255, 0, 0, 0.05)';
            ctx.fillRect(0,0,w,h);
        } else {
            stability = Math.min(100, stability + 0.05);
        }

        stabilityEl.innerText = `${Math.floor(stability)}%`;
        integrityFill.style.width = `${stability}%`;
        if(stability < 30) {
            stabilityEl.className = 'danger';
            if(Math.random() > 0.95) addLog("<span class='danger'>> CRITICAL: SUBJECT BREACH IMMINENT</span>");
        } else {
            stabilityEl.className = '';
        }

        if(stability <= 0) gameOver();

        // Draw Waves
        // 1. Background Grid
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 1;
        for(let i=0; i<w; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,h); ctx.stroke(); }
        for(let i=0; i<h; i+=40) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(w,i); ctx.stroke(); }

        // 2. Target Wave (Red/Organic)
        ctx.beginPath();
        ctx.strokeStyle = '#411';
        ctx.lineWidth = 3;
        for(let x=0; x<w; x++) {
            const y = h/2 + Math.sin(x * targetSignal.freq + time + targetSignal.phase) * targetSignal.amp;
            if(x === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.stroke();

        // 3. User Wave (Green/Digital)
        ctx.beginPath();
        ctx.strokeStyle = '#39ff14';
        ctx.lineWidth = 2;
        ctx.shadowBlur = 5;
        ctx.shadowColor = '#39ff14';
        for(let x=0; x<w; x++) {
            const y = h/2 + Math.sin(x * userFreq + time + userPhase) * userAmp;
            if(x === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;

        requestAnimationFrame(draw);
    }

    function gameOver() {
        playing = false;
        ctx.fillStyle = '#1a0f0f';
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = '#ff3131';
        ctx.font = '40px VT323';
        ctx.textAlign = 'center';
        ctx.fillText("SUBJECT BREACHED", w/2, h/2);
        addLog("<span class='danger'>> TERMINAL OFFLINE. PERSONNEL LOSS DETECTED.</span>");
        document.getElementById('reset-btn').style.display = 'block';
    }

    document.getElementById('reset-btn').addEventListener('click', () => {
        stability = 100;
        playing = true;
        document.getElementById('reset-btn').style.display = 'none';
        logEl.innerHTML = "> SYSTEM REBOOTING...";
        draw();
    });

    draw();
</script>
</body>
</html>
