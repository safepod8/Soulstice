<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID-HEART 32-BIT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            margin: 0;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            font-family: 'VT323', monospace;
            overflow: hidden;
        }

        /* The scaling container ensures pixels stay sharp */
        #screen-container {
            position: relative;
            border: 8px solid #334;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            background: #000;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            width: 640px; /* Scaled up view */
            height: 576px;
        }

        .ui-overlay {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            font-size: 24px;
        }

        .controls-hint {
            margin-top: 20px;
            color: #889;
            text-align: center;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="screen-container">
        <div class="ui-overlay">
            <span id="hp-label">HP: 20/20</span>
        </div>
        <canvas id="g"></canvas>
    </div>

    <div class="controls-hint">
        ARROWS: MOVE | Z: START/ACTION
    </div>

<script>
    // Native internal resolution (low-res for real pixel art)
    const RES_W = 160;
    const RES_H = 144;
    const canvas = document.getElementById('g');
    const ctx = canvas.getContext('2d', { alpha: false });
    canvas.width = RES_W;
    canvas.height = RES_H;

    // Disable image smoothing for that 32-bit look
    ctx.imageSmoothingEnabled = false;

    let state = 'START';
    let frame = 0;
    let hp = 20;
    let particles = [];
    let bullets = [];
    let shake = 0;

    const player = {
        x: RES_W / 2,
        y: RES_H - 30,
        w: 5,
        h: 5,
        speed: 1.5
    };

    const keys = {};
    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if(e.code === 'KeyZ' && state !== 'PLAY') startGame();
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function startGame() {
        state = 'PLAY';
        hp = 20;
        bullets = [];
        frame = 0;
    }

    // Helper to draw pixel-art sprites manually
    function drawPixelSprite(data, x, y, size = 1) {
        data.forEach((row, dy) => {
            row.split('').forEach((pixel, dx) => {
                if (pixel === ' ') return;
                if (pixel === 'R') ctx.fillStyle = '#f44';
                if (pixel === 'W') ctx.fillStyle = '#fff';
                if (pixel === 'B') ctx.fillStyle = '#111';
                if (pixel === 'G') ctx.fillStyle = '#4f4';
                if (pixel === 'P') ctx.fillStyle = '#d4f';
                if (pixel === 'Y') ctx.fillStyle = '#ff0';
                ctx.fillRect(Math.floor(x + dx * size), Math.floor(y + dy * size), size, size);
            });
        });
    }

    const bossSprite = [
        "   BBBBBB   ",
        "  BBWWWWBB  ",
        " BBWBBBBWBB ",
        "BBWBPWWPBWBB",
        "BBWBPWWPBWBB",
        " BBWBBBBWBB ",
        "  BBWWWWBB  ",
        "   BBBBBB   ",
        "     BB     ",
        "    BBBB    ",
        "   BB  BB   "
    ];

    const heartSprite = [
        " R R ",
        "RRRRR",
        "RRRRR",
        " RRR ",
        "  R  "
    ];

    function update() {
        if (state !== 'PLAY') return;
        frame++;

        if (shake > 0) shake--;

        // Movement with sub-pixel prevention
        if (keys['ArrowUp']) player.y -= player.speed;
        if (keys['ArrowDown']) player.y += player.speed;
        if (keys['ArrowLeft']) player.x -= player.speed;
        if (keys['ArrowRight']) player.x += player.speed;

        // Constraint within "Battle Box"
        player.x = Math.max(45, Math.min(115, player.x));
        player.y = Math.max(80, Math.min(130, player.y));

        // Patterns
        if (frame % 40 === 0) {
            for(let i=0; i<8; i++) {
                const ang = (i / 8) * Math.PI * 2 + (frame * 0.01);
                bullets.push({ x: RES_W/2, y: 40, vx: Math.cos(ang), vy: Math.sin(ang), type: 'orb' });
            }
        }
        
        if (frame % 10 === 0) {
            bullets.push({ 
                x: 40 + Math.random() * 80, 
                y: 0, 
                vx: 0, 
                vy: 1.2, 
                type: 'drop' 
            });
        }

        // Bullet Logic
        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            b.x += b.vx;
            b.y += b.vy;

            // Collision
            if (Math.abs(b.x - player.x) < 3 && Math.abs(b.y - player.y) < 3) {
                hp -= 1;
                shake = 10;
                bullets.splice(i, 1);
                document.getElementById('hp-label').innerText = `HP: ${hp}/20`;
                if (hp <= 0) state = 'GAMEOVER';
                continue;
            }

            if (b.y > RES_H || b.x < 0 || b.x > RES_W) bullets.splice(i, 1);
        }
    }

    function draw() {
        // Clear with slight flicker for "old hardware" feel
        ctx.fillStyle = '#0a0a0c';
        ctx.fillRect(0, 0, RES_W, RES_H);

        if (shake > 0) ctx.translate((Math.random()-0.5)*2, (Math.random()-0.5)*2);

        // Draw Battle Box
        ctx.strokeStyle = '#445';
        ctx.lineWidth = 1;
        ctx.strokeRect(40, 80, 80, 55);

        // Draw Boss
        const bx = RES_W / 2 - 6;
        const by = 20 + Math.sin(frame * 0.08) * 4;
        drawPixelSprite(bossSprite, bx, by);
        
        // Eyes glow
        ctx.fillStyle = (frame % 30 < 15) ? '#f0f' : '#fff';
        ctx.fillRect(bx + 4, by + 3, 1, 1);
        ctx.fillRect(bx + 7, by + 3, 1, 1);

        // Draw Bullets
        bullets.forEach(b => {
            if (b.type === 'orb') ctx.fillStyle = '#fff';
            else ctx.fillStyle = '#4f4';
            ctx.fillRect(Math.floor(b.x), Math.floor(b.y), 2, 2);
        });

        // Draw Player
        if (state === 'PLAY') {
            drawPixelSprite(heartSprite, player.x - 2, player.y - 2);
        }

        if (state === 'START') {
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.fillText('VOID-HEART', RES_W/2, 100);
            ctx.fillText('PRESS Z', RES_W/2, 115);
        }

        if (state === 'GAMEOVER') {
            ctx.fillStyle = '#f00';
            ctx.textAlign = 'center';
            ctx.fillText('SOUL SHATTERED', RES_W/2, 100);
            ctx.fillText('PRESS Z TO RE-LINK', RES_W/2, 115);
        }

        ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset shake
        requestAnimationFrame(draw);
    }

    setInterval(update, 1000/60);
    draw();
</script>
</body>
</html>
